<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Alta Pinta | Moda Urbana y Streetwear Premium Bolivia</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Alta Pinta - Nacidos en el asfalto. La marca boliviana de moda urbana y streetwear con calidad industrial y ADN de barrio. Descubre pantalones, buzos y remeras exclusivas." />
    <meta name="keywords" content="moda urbana, streetwear bolivia, alta pinta, ropa urbana, pantalones cargo, remeras oversized, buzos, calidad premium" />
    <meta name="author" content="Alta Pinta Moda Urbana" />
    
    <!-- Open Graph / Social Media (WhatsApp, Facebook) -->
    <meta property="og:title" content="Alta Pinta | La Armadura del Asfalto Boliviano" />
    <meta property="og:description" content="Moda urbana premium con ADN boliviano y estética cruda. Entra y conoce nuestra nueva colección de ropa." />
    <meta property="og:image" content="assets/images/logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_BO" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo.png" />
    <link rel="apple-touch-icon" href="assets/images/logo.png" />
    <!-- Frameworks & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/main.css">

    <!-- Theme Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'alta-black': '#121212',
                        'alta-neon': '#A6FF00',
                        'alta-gray': '#1E1E1E',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-alta-black text-white font-sans antialiased">
    <!-- Components (Header, Menu, Footer) are injected by js/app.js -->
    
    <main class="relative min-h-screen flex flex-col pt-20">
        <!-- Contenido dinámico inyectado por App.js -->
    </main>

    <!-- App Logic -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
